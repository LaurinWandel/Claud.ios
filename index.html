<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Media Collector</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #007aff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .section { background: var(--card-bg); padding: 15px; border-radius: 12px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: #aaa; }
        select, input, button {
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: #2a2a2a; color: #fff; font-size: 1rem; box-sizing: border-box;
        }
        button { background: var(--accent-color); font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .btn-grid { display: flex; flex-direction: column; gap: 12px; }
        .media-btn { background: #2c2c2e; border: 1px solid #3a3a3c; font-size: 1.1rem; padding: 18px; }
        .hidden { display: none !important; }
        #status { font-size: 0.85rem; color: #00eb87; text-align: center; margin-top: 10px; word-break: break-word; }
    </style>
</head>
<body>

    <h1>Media Project Collector</h1>

    <div class="container">
        <button id="loginBtn">Mit Google Drive verbinden</button>

        <div id="appContent" class="hidden">
            <div class="section">
                <label for="projectSelect">Projekt auswählen</label>
                <select id="projectSelect">
                    <option value="">-- Bitte wählen --</option>
                </select>
                <hr style="border-color: #2a2a2a; margin: 15px 0;">
                <label for="newProjectInput">Oder neues Projekt erstellen</label>
                <input type="text" id="newProjectInput" placeholder="Projektname eingeben...">
                <button id="createProjBtn" style="margin-top: 8px; background: #34c759;">Projekt anlegen</button>
            </div>

            <div class="section btn-grid">
                <label>Medium aufnehmen (wird automatisch hochgeladen)</label>
                
                <button class="media-btn" onclick="document.getElementById('photoInput').click()">📸 Foto machen</button>
                <input type="file" id="photoInput" accept="image/*" capture="environment" class="hidden">

                <button class="media-btn" onclick="document.getElementById('videoInput').click()">🎥 Video machen</button>
                <input type="file" id="videoInput" accept="video/*" capture="environment" class="hidden">

                <button class="media-btn" id="audioBtn">🎙️ Sprachnachricht starten</button>
            </div>
        </div>

        <div id="status">Bitte logge dich ein.</div>
    </div>

    <script>
        // CLIENT CONFIGURATION (HIER DEINE DATEN EINTRAGEN!)
        const CLIENT_ID = '399684039736-kiua91h493q6mb4toda59vv67grqarrg.apps.googleusercontent.com';
        const REDIRECT_URI = window.location.href.split('#')[0]; 
        const SCOPES = 'https://www.googleapis.com/auth/drive.file'; 

        let accessToken = null;
        let currentFolderId = null;
        let mediaRecorder = null;
        let audioChunks = [];

        // DOM Elemente
        const loginBtn = document.getElementById('loginBtn');
        const appContent = document.getElementById('appContent');
        const statusDiv = document.getElementById('status');
        const projectSelect = document.getElementById('projectSelect');
        const newProjectInput = document.getElementById('newProjectInput');
        const createProjBtn = document.getElementById('createProjBtn');
        const audioBtn = document.getElementById('audioBtn');

        // 1. OAUTH HANDSHAKE BEIM LADEN PRÜFEN
        function checkAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            accessToken = params.get('access_token');

            if (accessToken) {
                loginBtn.classList.add('hidden');
                appContent.classList.remove('hidden');
                statusDiv.innerText = "Erfolgreich mit Google Drive verbunden.";
                loadProjects();
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        loginBtn.addEventListener('click', () => {
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}`;
            window.location.href = authUrl;
        });

        // 2. PROJEKTE (ORDNER) AUS DRIVE LADEN (Hier bereinigt)
        async function loadProjects() {
            statusDiv.innerText = "Lade Projekte...";
            try {
                // Bereinigter API-Call ohne doppelten Token-Parameter
                const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id, name)`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                
                projectSelect.innerHTML = '<option value="">-- Bitte wählen --</option>';
                if (data.files && data.files.length > 0) {
                    data.files.forEach(folder => {
                        const opt = document.createElement('option');
                        opt.value = folder.id;
                        opt.innerText = folder.name;
                        projectSelect.appendChild(opt);
                    });
                    
                    // Falls vorher schon ein Projekt aktiv war, wähle es wieder aus
                    if (currentFolderId) {
                        projectSelect.value = currentFolderId;
                    }
                    statusDiv.innerText = currentFolderId ? "Projekte geladen. Aktuelles Projekt aktiv." : "Projekte geladen. Bitte wählen.";
                } else {
                    statusDiv.innerText = "Keine Projekte in Google Drive gefunden. Erstelle eins!";
                }
            } catch (err) {
                statusDiv.innerText = "Fehler beim Laden der Projekte.";
                console.error(err);
            }
        }

        // 3. NEUEN ORDNER (PROJEKT) ERSTELLEN
        createProjBtn.addEventListener('click', async () => {
            const name = newProjectInput.value.trim();
            if (!name) return alert("Bitte Projektnamen eingeben!");
            
            statusDiv.innerText = `Erstelle Projekt "${name}"...`;
            try {
                const response = await fetch('https://www.googleapis.com/drive/v3/files', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        mimeType: 'application/vnd.google-apps.folder'
                    })
                });
                const folder = await response.json();
                newProjectInput.value = "";
                
                // Wichtig: Zuerst die ID global setzen, damit die App sie nicht vergisst
                currentFolderId = folder.id;
                
                // Projekte neu laden und Dropdown aktualisieren
                await loadProjects();
                
                statusDiv.innerText = `Projekt "${name}" aktiv.`;
            } catch (err) {
                statusDiv.innerText = "Fehler beim Erstellen des Ordners.";
                console.error(err);
            }
        });

        projectSelect.addEventListener('change', (e) => {
            currentFolderId = e.target.value;
            statusDiv.innerText = currentFolderId ? "Projekt gewechselt." : "Bitte Projekt wählen.";
        });

        // GENERIERE ZEITSTEMPEL-DATEINAME
        function getTimestampName(prefix, extension) {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
            return `${prefix}_${timeStr}.${extension}`;
        }

        // 4. DATEI ZU GOOGLE DRIVE HOCHLADEN
        async function uploadToDrive(blob, filename, mimeType) {
            if (!currentFolderId) {
                alert("Bitte wähle zuerst ein Projekt aus!");
                return;
            }
            statusDiv.innerText = `Hochladen: ${filename}...`;

            const metadata = {
                name: filename,
                parents: [currentFolderId],
                mimeType: mimeType
            };

            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            formData.append('file', blob);

            try {
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` },
                    body: formData
                });
                if (response.ok) {
                    statusDiv.innerText = `Erfolgreich hochgeladen: ${filename}`;
                } else {
                    statusDiv.innerText = "Upload-Fehler seitens Google.";
                }
            } catch (err) {
                statusDiv.innerText = "Netzwerkfehler beim Upload.";
                console.error(err);
            }
        }

        // 5. INPUT-TREIBER (FOTO & VIDEO) ÜBERWACHEN
        document.getElementById('photoInput').addEventListener('change', function(e) {
            if (e.target.files.length === 0) return;
            const file = e.target.files[0];
            const name = getTimestampName("FOTO", "jpg");
            uploadToDrive(file, name, file.type);
        });

        document.getElementById('videoInput').addEventListener('change', function(e) {
            if (e.target.files.length === 0) return;
            const file = e.target.files[0];
            const name = getTimestampName("VIDEO", "mp4");
            uploadToDrive(file, name, file.type);
        });

        // 6. SPRACHNACHRICHT-LOGIK
        audioBtn.addEventListener('click', async () => {
            if (!currentFolderId) return alert("Bitte zuerst ein Projekt wählen!");

            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/m4a' });
                    const name = getTimestampName("AUDIO", "m4a");
                    uploadToDrive(audioBlob, name, 'audio/m4a');
                    audioBtn.innerText = "🎙️ Sprachnachricht starten";
                    audioBtn.style.background = "#2c2c2e";
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                audioBtn.innerText = "🛑 Aufnahme stoppen...";
                audioBtn.style.background = "#ff3b30";
                statusDiv.innerText = "Nehme Audio auf...";
            } catch (err) {
                alert("Mikrofon-Zugriff verweigert oder nicht unterstützt.");
                console.error(err);
            }
        });

        window.onload = checkAuth;
    </script>
</body>
</html>
